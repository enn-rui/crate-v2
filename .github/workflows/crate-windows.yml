# Crate v2 CI: Windows x64 build + installer artifact.
# Mirrors the Windows x64 entry of upstream build.yml (which stays untracked-by-CI:
# upstream workflows are disabled at the repo level). No secrets, no signing.
name: crate-windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Windows x64 build
    runs-on: windows-2025
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure that all tags are fetched
        run: git fetch origin --force --tags

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Get build environment name
        shell: cmd
        run: tools\windows_buildenv.bat name
        env:
          BUILDENV_RELEASE: TRUE

      - name: Set up build environment
        shell: cmd
        run: tools\windows_buildenv.bat setup
        env:
          BUILDENV_BASEPATH: C:\buildenv
          BUILDENV_RELEASE: TRUE

      - name: Create build directory
        run: mkdir build

      - name: Configure
        run: >-
          cmake
          -DBULK=ON
          -DHSS1394=ON
          -DLOCALECOMPARE=ON
          -DMAD=ON
          -DMEDIAFOUNDATION=ON
          -DMODPLUG=ON
          -DQT6=ON
          -DQML=ON
          -DWAVPACK=ON
          -DVCPKG_TARGET_TRIPLET=x64-windows-release
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}"
          -DWARNINGS_FATAL=ON
          -DDEBUG_ASSERTIONS_FATAL=OFF
          -DBATTERY=ON
          -DBROADCAST=ON
          -DDOWNLOAD_MANUAL=ON
          -DHID=ON
          -DKEYFINDER=ON
          -DLILV=ON
          -DOPUS=ON
          -DQTKEYCHAIN=ON
          -DVINYLCONTROL=ON
          -DCMAKE_VERBOSE_MAKEFILE=OFF
          -L
          ..
        working-directory: build
        env:
          CC: cl
          CXX: cl

      - name: Set up MSVC problem matcher
        uses: ammaraskar/msvc-problem-matcher@0.3.0

      - name: Build
        run: cmake --build . --config RelWithDebInfo
        working-directory: build

      - name: Test
        run: ctest --timeout 45 --exclude-regex '^AutoDJProcessorTest.*$'
        working-directory: build
        env:
          GTEST_COLOR: 1
          CTEST_OUTPUT_ON_FAILURE: 1
          QT_QPA_PLATFORM: offscreen

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet.exe tool install --global wix --version 6.0.2
          wix extension add --global WixToolset.UI.wixext/6.0.2

      - name: Package installer
        run: cpack -G WIX -V
        working-directory: build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-windows-x64-installer
          path: build/*.msi
